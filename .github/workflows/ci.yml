name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AI_API_KEY: ''
      OPENAI_API_KEY: ''
      SMART_CANTEEN_SECRET: ci-smart-canteen-secret-change-me
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check server entrypoints
        run: |
          node --check server/app.js
          node --check server/database.js
          node --check server/storage.js
          node --check server/migrations.js
          node --check server/rbac.js

      - name: Run full test suite
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Docker build smoke
        run: docker build -t smart-canteen-ci .
