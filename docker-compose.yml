name: smart-canteen

services:
  api:
    build: .
    container_name: smart-canteen-api
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      SMART_CANTEEN_SECRET: ${SMART_CANTEEN_SECRET:?set SMART_CANTEEN_SECRET in .env}
      DB_DRIVER: ${DB_DRIVER:-postgres}
      DB_MIGRATE: ${DB_MIGRATE:-1}
      HEALTH_KB_AUTOLOAD: ${HEALTH_KB_AUTOLOAD:-1}
      HEALTH_KB_DIR: ${HEALTH_KB_DIR:-/app/knowledge/health-knowledge-bases}
      HEALTH_KB_CHUNK_SIZE: ${HEALTH_KB_CHUNK_SIZE:-900}
      HEALTH_KB_CHUNK_OVERLAP: ${HEALTH_KB_CHUNK_OVERLAP:-120}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgres://${POSTGRES_USER:-smart_canteen}:${POSTGRES_PASSWORD:-smart_canteen}@postgres:5432/${POSTGRES_DB:-smart_canteen}}
      SMART_CANTEEN_DB: /app/data/smart-canteen.sqlite
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      UPLOAD_DIR: /app/uploads
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-/uploads}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-smart-canteen}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-smart-canteen-secret}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/smart-canteen-uploads}
    volumes:
      - smart_canteen_data:/app/data
      - smart_canteen_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    container_name: smart-canteen-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_canteen}
      POSTGRES_USER: ${POSTGRES_USER:-smart_canteen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_canteen}
    volumes:
      - smart_canteen_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smart-canteen-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - smart_canteen_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: smart-canteen-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smart-canteen}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-smart-canteen-secret}
    volumes:
      - smart_canteen_minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: smart-canteen-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - smart_canteen_uploads:/usr/share/nginx/uploads:ro
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  smart_canteen_data:
  smart_canteen_uploads:
  smart_canteen_pg:
  smart_canteen_redis:
  smart_canteen_minio:
