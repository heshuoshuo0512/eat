<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧食堂 - 登录预览</title>
<style>
  :root {
    --primary: #1f7a4d;
    --primary-dark: #115b37;
    --primary-light: #36a367;
    --primary-soft: #5ec17a;
    --accent: #ffb43b;
    --muted: #64705f;
    --ease: cubic-bezier(.2, .8, .2, 1);
    --font-sans: "Inter", "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei UI", system-ui, sans-serif;
    --font-display: "Inter", "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei UI", system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: var(--font-sans);
    background:
      radial-gradient(circle at 8% 0%, rgba(111, 203, 115, .36), transparent 27rem),
      radial-gradient(circle at 92% 12%, rgba(255, 180, 59, .24), transparent 25rem),
      radial-gradient(circle at 48% 110%, rgba(31, 122, 77, .16), transparent 34rem),
      linear-gradient(135deg, #f9fbf6 0%, #edf6e8 52%, #f7f1df 100%);
    color: #102016;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.36) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.36) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at 50% 10%, black, transparent 72%);
  }

  /* ═══════════════════════════════════════════════════════
     主容器
     ═══════════════════════════════════════════════════════ */
  .login-container {
    position: relative;
    z-index: 1;
    width: 99vw;
    height: 90vh;
    max-width: 1700px;
    background: rgba(255,255,255,0.62);
    border-radius: 40px;
    box-shadow: 0 40px 120px rgba(24,72,43,0.16), 0 16px 40px rgba(24,72,43,0.08);
    border: 1px solid rgba(255,255,255,0.72);
    backdrop-filter: blur(22px) saturate(1.22);
    -webkit-backdrop-filter: blur(22px) saturate(1.22);
    display: grid;
    grid-template-columns: minmax(0, 1fr) 680px;
    overflow: hidden;
    animation: surface-in .5s var(--ease) both;
  }

  @keyframes surface-in {
    from { opacity: 0; transform: translateY(10px) scale(.99); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ═══════════════════════════════════════════════════════
     左侧 Hero —— 内容不变，尺寸缩小
     ═══════════════════════════════════════════════════════ */
  .login-hero {
    padding: clamp(48px, 6vw, 80px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 32px;
    position: relative;
    overflow: hidden;
    text-align: left;
  }

  .login-hero::before {
    content: '';
    position: absolute;
    inset: 18px 24px auto auto;
    width: 120px; height: 120px;
    border-radius: 32px;
    background: linear-gradient(135deg, rgba(31,122,77,.14), rgba(255,180,59,.12));
    transform: rotate(14deg);
    animation: card-float 8s var(--ease) infinite alternate;
  }

  .login-hero::after {
    content: '';
    position: absolute;
    width: 240px; height: 240px;
    right: -80px; bottom: -80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(31,122,77,.14), transparent 66%);
    animation: pulse-soft 9s var(--ease) infinite;
  }

  @keyframes card-float {
    from { transform: translateY(0) rotate(14deg); }
    to { transform: translateY(12px) rotate(8deg); }
  }

  @keyframes pulse-soft {
    0%, 100% { opacity: .78; transform: scale(1); }
    50% { opacity: .48; transform: scale(1.06); }
  }

  .brand {
    display: flex; gap: 10px; align-items: center;
    position: relative; z-index: 1;
    transform: translateX(-275px);
  }

  .brand-mark {
    width: 40px; height: 40px;
    display: grid; place-items: center;
    border-radius: 14px;
    background: linear-gradient(135deg, #1f7a4d, #5ec17a 58%, #ffc55d);
    color: white;
    font-family: var(--font-display);
    font-weight: 760; font-size: 20px;
    box-shadow: 0 12px 24px rgba(31,122,77,.22);
  }

  .brand strong {
    display: block;
    font-family: var(--font-display);
    font-weight: 760;
    letter-spacing: -.025em;
    font-size: 18px;
  }

  .brand small {
    display: block;
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
  }

  .eyebrow {
    margin: 0;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: .12em;
    font-size: 16px;
    font-weight: 760;
    position: relative; z-index: 1;
    transform: translateX(-200px);
  }

  .login-hero h1 {
    max-width: 680px;
    margin: 0;
    font-family: var(--font-display);
    font-size: clamp(44px, 6vw, 64px);
    font-weight: 760;
    line-height: 1.08;
    letter-spacing: -.04em;
    background: linear-gradient(105deg, #102016 0%, #17633d 54%, #d78b16 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    position: relative; z-index: 1;
  }

  .hero-copy {
    color: var(--muted);
    line-height: 1.7;
    font-size: 19px;
    position: relative; z-index: 1;
    max-width: 680px;
    margin-top: 20px;
  }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
    margin-top: 12px;
    position: relative; z-index: 1;
    max-width: 600px;
  }

  .metric-grid article {
    padding: 32px 34px;
    border-radius: 32px;
    background: linear-gradient(135deg, rgba(244,250,239,.82), rgba(255,255,255,.76));
    border: 1px solid rgba(255,255,255,.72);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
  }

  .metric-grid strong {
    display: block;
    font-family: var(--font-display);
    font-size: 44px;
    font-weight: 780;
    letter-spacing: -.035em;
    color: var(--primary-dark);
  }

  .metric-grid span {
    color: var(--muted);
    font-size: 20px;
  }

  /* ═══════════════════════════════════════════════════════
     右侧面板 —— 滑动切换（完全复刻参考设计逻辑）
     ═══════════════════════════════════════════════════════ */
  .login-panel {
    position: relative;
    background: linear-gradient(170deg, rgba(31,122,77,0.05), rgba(94,193,122,0.08), rgba(31,122,77,0.03));
    overflow: hidden;
    min-height: 720px;
  }

  /* 滑动表单（参考 .form-box） */
  .form-box {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 3%;
    width: 420px;
    background: #fff;
    border-radius: 22px;
    padding: 44px 40px;
    box-shadow: 0 24px 60px rgba(31,122,77,0.16), 4px 0 32px rgba(0,0,0,0.06);
    z-index: 2;
    transition: left 0.5s ease-in-out;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  /* 滑动到注册位置 */
  .form-box.slide-register {
    left: calc(97% - 420px);
  }

  .login-form-content,
  .register-form-content {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .hidden { display: none; }

  .form-box h1 {
    text-align: center;
    text-transform: uppercase;
    color: var(--primary);
    letter-spacing: 7px;
    font-size: 36px;
    font-family: var(--font-display);
    font-weight: 730;
    margin: 0;
  }

  .form-subtitle {
    text-align: center;
    font-size: 16px;
    color: var(--muted);
    letter-spacing: .06em;
    margin-top: -10px;
  }

  /* 角色 Tab */
  .role-tabs {
    display: flex;
    gap: 0;
    background: rgba(31,122,77,0.06);
    border-radius: 16px;
    padding: 6px;
  }

  .role-tabs button {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--muted);
    font-weight: 650;
    font-size: 16px;
    padding: 15px 18px;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: .02em;
    transition: 0.35s ease;
    font-family: var(--font-sans);
  }

  .role-tabs button.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff;
    box-shadow: 0 8px 18px rgba(31,122,77,.22);
  }

  /* 输入框 */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .input-group input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(31,122,77,0.2);
    padding: 16px 4px;
    font-size: 18px;
    color: #102016;
    letter-spacing: .03em;
    outline: none;
    transition: 0.35s ease;
    font-family: var(--font-sans);
    text-indent: 6px;
  }

  .input-group input::placeholder {
    color: #9aab94;
    letter-spacing: .03em;
  }

  .input-group input:focus {
    border-bottom-color: var(--primary);
  }

  .input-group input:focus::placeholder {
    opacity: 0;
    transition: 0.3s;
  }

  /* 提交按钮 */
  .submit-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light) 62%, var(--primary-soft));
    color: #fff;
    font-size: 18px;
    font-weight: 720;
    letter-spacing: .04em;
    cursor: pointer;
    box-shadow: 0 16px 36px rgba(31,122,77,.24);
    transition: 0.3s ease;
    font-family: var(--font-sans);
    position: relative;
    overflow: hidden;
  }

  .submit-btn::after {
    content: '';
    position: absolute;
    inset: 0 auto 0 -70%;
    width: 55%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
    transform: skewX(-18deg);
    transition: left .55s var(--ease);
  }

  .submit-btn:hover::after { left: 125%; }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 32px rgba(31,122,77,.3);
  }
  .submit-btn:disabled {
    opacity: .6;
    cursor: not-allowed;
    transform: none;
  }

  .form-error {
    color: #c4533c;
    font-size: 13px;
    text-align: center;
    font-weight: 650;
    display: none;
  }

  /* 两侧固定文字（参考 .con-box） */
  .con-box {
    width: 45%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
    text-align: center;
  }

  .con-box.left  { left: -6%; }
  .con-box.right { right: -6%; }

  .con-box h2 {
    color: var(--primary);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
    transition: 0.3s;
    white-space: nowrap;
  }

  .con-box p {
    font-size: 14px;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .con-box span {
    color: var(--primary-soft);
    font-weight: 700;
  }

  .con-box .con-icon {
    font-size: 52px;
    margin-bottom: 12px;
    opacity: 0.85;
    animation: card-float 6s var(--ease) infinite alternate;
  }

  .con-box button {
    background: #fff;
    color: var(--primary);
    border: 1px solid rgba(31,122,77,0.22);
    padding: 9px 22px;
    border-radius: 10px;
    letter-spacing: 1px;
    font-size: 14px;
    font-weight: 650;
    cursor: pointer;
    transition: 0.3s ease;
    font-family: var(--font-sans);
  }

  .con-box button:hover {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff;
    border-color: transparent;
  }

  /* ═══════════════════════════════════════════════════════
     响应式
     ═══════════════════════════════════════════════════════ */
  @media (max-width: 820px) {
    .login-container {
      grid-template-columns: 1fr;
      max-width: 460px;
    }
    .login-panel { min-height: 500px; }
    .form-box { width: 280px; left: 50%; transform: translate(-50%, -50%); }
    .form-box.slide-register { left: calc(98% - 280px); transform: translateY(-50%); }
    .login-hero { padding: 28px; gap: 12px; }
    .con-box h2 { font-size: 16px; letter-spacing: 1px; }
  }

  @media (max-width: 440px) {
    .login-container { border-radius: 18px; }
    .form-box { width: 260px; padding: 24px 18px; }
    .form-box.slide-register { left: calc(98% - 260px); }
    .con-box h2 { font-size: 14px; }
    .con-box p { font-size: 10px; }
    .con-box .con-icon { font-size: 36px; }
  }
</style>
</head>
<body>

<div class="login-container">

  <!-- ═══════════ 左侧 Hero ═══════════ -->
  <section class="login-hero">
    <div class="brand">
      <span class="brand-mark">食</span>
      <span>
        <strong>智慧食堂</strong>
        <small>Enterprise MVP</small>
      </span>
    </div>
    <p class="eyebrow">Smart Canteen Platform</p>
    <h1>开启您的智慧食堂体验，轻松搞定每一餐</h1>
    <p class="hero-copy">档口菜品检索、每日热门排行、AI智能推荐、轻松点餐加购......解决您的吃饭难题！</p>
    <div class="metric-grid">
      <article><strong>RBAC</strong><span>角色权限管控</span></article>
      <article><strong>RAG</strong><span>真实菜品检索</span></article>
      <article><strong>DB</strong><span>数据库持久化</span></article>
      <article><strong>API</strong><span>OpenAPI 合同</span></article>
    </div>
  </section>

  <!-- ═══════════ 右侧滑动面板 ═══════════ -->
  <section class="login-panel">

    <!-- 左侧提示 -->
    <div class="con-box left">
      <span class="con-icon">🍽️</span>
      <h2>欢迎来到<span>智慧食堂</span></h2>
      <p>已有<span>账号</span>？</p>
      <button id="slideToLogin">去登录</button>
    </div>

    <!-- 右侧提示 -->
    <div class="con-box right">
      <span class="con-icon">🥗</span>
      <h2>欢迎来到<span>智慧食堂</span></h2>
      <p>还没有<span>账号</span>？</p>
      <button id="slideToRegister">去注册</button>
    </div>

    <!-- 滑动表单 -->
    <div class="form-box" id="formBox">

      <!-- ===== 登录 ===== -->
      <div class="login-form-content" id="loginContent">
        <h1>login</h1>
        <p class="form-subtitle">选择身份进入系统</p>

        <div class="role-tabs">
          <button id="studentTab" class="active" onclick="selectRole('student')">🎓 学生端</button>
          <button id="adminTab" onclick="selectRole('admin')">⚙️ 管理员端</button>
        </div>

        <div class="input-group">
          <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username">
          <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
        </div>

        <p class="form-error" id="loginError">请输入用户名和密码</p>

        <button class="submit-btn" onclick="handleLogin()">进入系统</button>
      </div>

      <!-- ===== 注册 ===== -->
      <div class="register-form-content hidden" id="registerContent">
        <h1>register</h1>
        <p class="form-subtitle">创建新账号进入系统</p>

        <div class="input-group">
          <input type="text" id="regUsername" placeholder="用户名" autocomplete="username">
          <input type="password" id="regPassword" placeholder="密码" autocomplete="new-password">
          <input type="password" id="regConfirm" placeholder="确认密码" autocomplete="new-password">
        </div>

        <p class="form-error" id="registerError">请填写完整信息</p>

        <button class="submit-btn" onclick="handleRegister()">注册并进入</button>
      </div>
    </div>

  </section>

</div>

<script>
  let currentRole = 'student';
  let isLogin = true;

  const demoAccounts = {
    student: { username: '演示学生', password: 'student123' },
    admin:   { username: 'admin',     password: 'admin123' }
  };

  // ---- 角色切换 ----
  function selectRole(role) {
    currentRole = role;
    document.getElementById('studentTab').classList.toggle('active', role === 'student');
    document.getElementById('adminTab').classList.toggle('active', role === 'admin');
    if (isLogin) {
      document.getElementById('loginUsername').value = demoAccounts[role].username;
      document.getElementById('loginPassword').value = demoAccounts[role].password;
    }
    hideAllErrors();
  }

  // ---- 滑动切换 ----
  document.getElementById('slideToRegister').addEventListener('click', slideToRegister);
  document.getElementById('slideToLogin').addEventListener('click', slideToLogin);

  function slideToRegister() {
    if (!isLogin) return;
    isLogin = false;
    document.getElementById('formBox').classList.add('slide-register');
    document.getElementById('loginContent').classList.add('hidden');
    document.getElementById('registerContent').classList.remove('hidden');
    hideAllErrors();
    document.getElementById('regUsername').value = '';
    document.getElementById('regPassword').value = '';
    document.getElementById('regConfirm').value = '';
  }

  function slideToLogin() {
    if (isLogin) return;
    isLogin = true;
    document.getElementById('formBox').classList.remove('slide-register');
    document.getElementById('registerContent').classList.add('hidden');
    document.getElementById('loginContent').classList.remove('hidden');
    hideAllErrors();
    document.getElementById('loginUsername').value = demoAccounts[currentRole].username;
    document.getElementById('loginPassword').value = demoAccounts[currentRole].password;
  }

  function hideAllErrors() {
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('registerError').style.display = 'none';
  }

  // ---- 登录 ----
  function handleLogin() {
    const u = document.getElementById('loginUsername').value.trim();
    const p = document.getElementById('loginPassword').value.trim();
    const err = document.getElementById('loginError');
    if (!u) { err.textContent = '请输入用户名'; err.style.display = 'block'; return; }
    if (!p) { err.textContent = '请输入密码'; err.style.display = 'block'; return; }
    err.style.display = 'none';
    alert(`[预览] 登录成功！\n角色：${currentRole === 'student' ? '学生' : '管理员'}\n用户名：${u}`);
  }

  // ---- 注册 ----
  function handleRegister() {
    const u = document.getElementById('regUsername').value.trim();
    const p = document.getElementById('regPassword').value.trim();
    const c = document.getElementById('regConfirm').value.trim();
    const err = document.getElementById('registerError');
    if (!u) { err.textContent = '请输入用户名'; err.style.display = 'block'; return; }
    if (!p) { err.textContent = '请输入密码'; err.style.display = 'block'; return; }
    if (p !== c) { err.textContent = '两次密码不一致'; err.style.display = 'block'; return; }
    err.style.display = 'none';
    alert(`[预览] 注册成功！\n用户名：${u}`);
    slideToLogin();
  }

  // 初始化
  document.getElementById('loginUsername').value = demoAccounts.student.username;
  document.getElementById('loginPassword').value = demoAccounts.student.password;
</script>

</body>
</html>
